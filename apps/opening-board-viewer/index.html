<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Opening Board Viewer</title>
  <link rel="stylesheet" href="/apps/opening-board-viewer/styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="panel controls">
      <button id="prevBtn">Previous</button>
      <button id="nextBtn">Next</button>
      <select id="sampleSelect"></select>
      <span class="muted" id="status">Loading...</span>
      <span class="muted" id="dataPath"></span>
    </div>

    <div class="panel board-panel">
      <svg id="board" viewBox="0 0 760 620"></svg>
    </div>

    <div class="panel holdout-panel">
      <h4>White Holdout Top 5 Groups</h4>
      <p class="muted holdout-help">Hover a pick to preview full placements on the board.</p>
      <div id="holdoutList" class="holdout-list">
        <p class="muted">-</p>
      </div>
    </div>

    <div class="panel accordion-panel">
      <details open>
        <summary>Board Details</summary>
        <pre id="metaText">-</pre>
      </details>
      <details>
        <summary>Ports (order)</summary>
        <div class="ports" id="ports"></div>
      </details>
      <details>
        <summary>Opening Placements</summary>
        <pre id="placementsText">-</pre>
      </details>
    </div>
  </div>
  <script src="/apps/opening-board-viewer/app.js"></script>
</body>
</html>
